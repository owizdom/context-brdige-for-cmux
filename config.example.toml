# mnemo configuration

[cmux]
# Path to the cmux Unix domain socket (only needed for cmux backend).
# If empty, reads from CMUX_SOCKET_PATH env var at runtime.
socket_path = ""

[bridge]
# How often (in seconds) to poll for session updates.
poll_interval_seconds = 5

# Max scrollback lines to read from each terminal session.
max_scrollback_lines = 300

# Where to store the SQLite database.
db_path = "~/.mnemo/sessions.db"

# Log level: debug | info | warn | error
log_level = "warn"

[anthropic]
# Your Anthropic API key. Can also be set via ANTHROPIC_API_KEY env var.
# Optional — mnemo works without it using structured fallback summaries.
api_key = ""

# Model used for context summarization.
model = "claude-haiku-4-5-20251001"

# Max tokens for summarized context output.
max_tokens = 2048
